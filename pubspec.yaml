name: moviemania
description: Discover and explore movies effortlessly with MovieMania.

publish_to: "none"

version: 2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  http: ^1.6.0
  phosphor_flutter: ^2.1.0
  carousel_slider_plus: ^7.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/noise/

  fonts:
    - family: Space-Grotesk
      fonts:
        - asset: assets/fonts/space_grotesk.ttf
